<app-navbar></app-navbar>

<div class="container">
  <h2 class="text-success mb-3">Loyalty Rewards</h2>

  <div class="card mb-4 shadow-sm">
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-1">Your Points Balance</h5>
        <small class="text-muted">Earn 1 point for every ₹10 spent.</small>
      </div>
      <div class="display-5 text-success fw-bold">{{ points }}</div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-3">Transaction History</h5>

      <div *ngIf="loading" class="text-center text-muted py-3">Loading...</div>
      <div *ngIf="!loading && transactions.length === 0" class="text-muted text-center py-3">
        No loyalty transactions yet.
      </div>

      <table *ngIf="!loading && transactions.length > 0" class="table table-sm">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th class="text-end">Earned</th>
            <th class="text-end">Redeemed</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of transactions">
            <td>{{ t.transactionDate | date: 'medium' }}</td>
            <td>{{ t.description }}</td>
            <td class="text-end text-success">+{{ t.pointsEarned }}</td>
            <td class="text-end text-danger">-{{ t.pointsRedeemed }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
